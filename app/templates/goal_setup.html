{% extends "base.html" %}

{% block title %}New Campaign - AI Networking Copilot{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Create a New Campaign</h1>
    <p>Define your networking goal and let AI find the best contacts</p>
</div>
<form method="post" action="/goals/new">
    <label for="goal_type">Goal Type</label>
    <select id="goal_type" name="goal_type" required>
        <option value="">Select a goal...</option>
        <option value="internship">Internship / Job Search</option>
        <option value="informational">Informational Interview</option>
        <option value="research">Research Collaboration</option>
        <option value="investor">Investor Outreach</option>
        <option value="mentorship">Find a Mentor</option>
        <option value="cofounder">Find a Co-Founder</option>
        <option value="other">Other</option>
    </select>

    <label for="description">Describe your goal</label>
    <textarea id="description" name="description" rows="3" placeholder="e.g., Looking for ML internships at top tech companies for Summer 2026" required></textarea>

    <label for="user_background">Your background</label>
    <textarea id="user_background" name="user_background" rows="3" placeholder="e.g., CS junior at Purdue, experienced in Python and ML, built a RAG chatbot project"></textarea>

    <label for="target_roles">Target roles (comma-separated)</label>
    <input type="text" id="target_roles" name="target_roles" placeholder="e.g., ML Engineer, Data Scientist, Research Engineer">

    <label for="target_companies">Target companies (comma-separated)</label>
    <input type="text" id="target_companies" name="target_companies" placeholder="e.g., Google, Meta, OpenAI, Anthropic">

    <button type="submit" id="submit-btn">Create Campaign</button>
</form>
<script>
document.querySelector('form').addEventListener('submit', function() {
    const btn = document.getElementById('submit-btn');
    btn.setAttribute('aria-busy', 'true');
    btn.textContent = 'Finding matches...';
    btn.disabled = true;
});
</script>
{% endblock %}
